<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Librería · Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --panel: #161922;
      --panel-2: #1d2230;
      --text: #e8eaf0;
      --text-dim: #8a92a6;
      --accent: #7c9eff;
      --user-bg: #2a3349;
      --bot-bg: #1d2230;
      --warn: #f0a16c;
      --border: #262b3a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .app {
      width: 100%; max-width: 720px; height: min(92vh, 880px);
      display: flex; flex-direction: column;
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    header h1 { margin: 0; font-size: 1.05rem; font-weight: 600; }
    header p { margin: .2rem 0 0; font-size: .85rem; color: var(--text-dim); }
    header a { color: var(--accent); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .msgs {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .msg { max-width: 85%; padding: .65rem .9rem; border-radius: 12px; line-height: 1.45; font-size: .95rem; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--user-bg); }
    .msg.bot  { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--border); }
    .msg.sys  { align-self: center; background: transparent; color: var(--warn); font-size: .85rem; max-width: 100%; text-align: center; }
    .typing { display: inline-flex; gap: .25rem; padding: .65rem .9rem; }
    .typing span { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: blink 1.2s infinite ease-in-out; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
    .composer {
      display: flex; gap: .5rem; padding: .85rem 1rem;
      border-top: 1px solid var(--border); background: var(--panel-2);
    }
    .composer input {
      flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: .65rem .85rem; font: inherit; outline: none;
    }
    .composer input:focus { border-color: var(--accent); }
    .composer button {
      background: var(--accent); color: #0f1117; border: 0; border-radius: 10px;
      padding: 0 1.1rem; font-weight: 600; cursor: pointer; font: inherit;
    }
    .composer button:disabled { opacity: .4; cursor: not-allowed; }
    .meta { font-size: .75rem; color: var(--text-dim); padding: 0 1rem .7rem; text-align: right; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>La Librería · Demo</h1>
      <p>
        Chat asistido por Claude con búsqueda en catálogo, detalles y recomendaciones. Probá:
        <em>"¿qué libros de Borges tenés?"</em> ·
        <a href="https://github.com/DavoLobos/whatsapp-llm-bot" target="_blank" rel="noopener">código en GitHub</a>
      </p>
    </header>
    <div class="msgs" id="msgs">
      <div class="msg bot">¡Hola! Soy el asistente de La Librería. ¿En qué te puedo ayudar?</div>
    </div>
    <div class="meta" id="meta"></div>
    <form class="composer" id="composer">
      <input id="input" type="text" placeholder="Escribí tu mensaje…" autocomplete="off" maxlength="500" required />
      <button type="submit" id="send">Enviar</button>
    </form>
  </div>

  <script>
    const SESSION_KEY = "libreria-demo-session";
    let sessionId = localStorage.getItem(SESSION_KEY);
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sessionId);
    }

    const msgsEl = document.getElementById("msgs");
    const metaEl = document.getElementById("meta");
    const form = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function appendMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      msgsEl.appendChild(el);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return el;
    }

    function appendTyping() {
      const el = document.createElement("div");
      el.className = "msg bot";
      el.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      msgsEl.appendChild(el);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return el;
    }

    async function send(text) {
      appendMessage("user", text);
      const typing = appendTyping();
      sendBtn.disabled = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();
        typing.remove();
        if (!res.ok) {
          appendMessage("sys", data.detail || "Error del servidor.");
          if (res.status === 429) sendBtn.disabled = true;
          return;
        }
        appendMessage("bot", data.reply);
        if (typeof data.remaining === "number") {
          metaEl.textContent = `Quedan ${data.remaining} mensajes en esta sesión.`;
          if (data.remaining === 0) sendBtn.disabled = true;
        }
      } catch (err) {
        typing.remove();
        appendMessage("sys", "No pude conectarme con el servidor. Probá de nuevo.");
      } finally {
        if (!sendBtn.disabled) sendBtn.disabled = false;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;
      input.value = "";
      send(text);
    });
  </script>
</body>
</html>
